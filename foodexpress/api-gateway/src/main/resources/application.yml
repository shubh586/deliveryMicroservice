server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # Auth Service Routes
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: auth-oauth2
          uri: lb://auth-service
          predicates:
            - Path=/oauth2/**, /login/oauth2/**
          filters:
            - StripPrefix=0

        # Restaurant Service Routes
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**, /api/menu/**
          filters:
            - StripPrefix=0

        # Order Service Routes
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**, /api/payments/**
          filters:
            - StripPrefix=0

        # Admin Routes  alag alag service me distributed hai ye
        - id: admin-auth
          uri: lb://auth-service
          predicates:
            - Path=/api/admin/users/**
          filters:
            - StripPrefix=0

        - id: admin-restaurants
          uri: lb://restaurant-service
          predicates:
            - Path=/api/admin/restaurants/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: localhost
      port: 6379


eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true


jwt:
  secret: ${JWT_SECRET:hellooo whaiwnefienfioxw,eewmdekxteomxxienix exnfionawenjjew}


logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.foodexpress.gateway: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
